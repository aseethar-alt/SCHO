<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCHO Coverage Navigator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap');

:root{
  --teal-deep:#0F3D3E;
  --teal-panel:#16524F;
  --teal-line:#2A6B65;
  --ivory:#F5F1E8;
  --ivory-dim:#C9DEDA;
  --amber:#F2A93B;
  --amber-dim:#9C7526;
  --sage:#8FCB9B;
  --rose:#E0776D;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--teal-deep);
  color:var(--ivory);
  font-family:'Work Sans',sans-serif;
  display:flex;
  justify-content:center;
  padding:32px 16px;
}
.app{
  width:100%;
  max-width:640px;
}
.brand{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:22px;
}
.brand h1{
  font-family:'Fraunces',serif;
  font-weight:600;
  font-size:26px;
  margin:0;
  letter-spacing:0.2px;
}
.brand span{
  font-size:12px;
  color:var(--ivory-dim);
  text-transform:uppercase;
  letter-spacing:1.5px;
}
/* trail / step tracker */
.trail{
  display:flex;
  align-items:center;
  margin-bottom:24px;
  padding:0 4px;
}
.trail-step{
  display:flex;
  flex-direction:column;
  align-items:center;
  flex:1;
  position:relative;
}
.trail-dot{
  width:11px;height:11px;border-radius:50%;
  background:var(--teal-line);
  border:2px solid var(--teal-line);
  z-index:2;
  transition:all .3s ease;
}
.trail-step.active .trail-dot{
  background:var(--amber);
  border-color:var(--amber);
  box-shadow:0 0 0 4px rgba(242,169,59,0.2);
}
.trail-step.done .trail-dot{
  background:var(--sage);
  border-color:var(--sage);
}
.trail-line{
  position:absolute;
  top:5px;
  left:50%;
  width:100%;
  height:2px;
  background:var(--teal-line);
  z-index:1;
}
.trail-step.done .trail-line, .trail-step.active .trail-line{
  background:var(--sage);
}
.trail-step:last-child .trail-line{display:none;}
.trail-label{
  font-size:10px;
  color:var(--ivory-dim);
  margin-top:6px;
  text-align:center;
  letter-spacing:0.3px;
}

.panel{
  background:var(--teal-panel);
  border:1px solid var(--teal-line);
  border-radius:14px;
  padding:22px;
  min-height:420px;
  display:flex;
  flex-direction:column;
}
.chat-log{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-bottom:18px;
}
.msg{
  max-width:88%;
  padding:12px 15px;
  border-radius:12px;
  line-height:1.5;
  font-size:14.5px;
  animation:fade .35s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.msg.bot{
  background:rgba(245,241,232,0.06);
  border:1px solid var(--teal-line);
  align-self:flex-start;
  border-top-left-radius:2px;
}
.msg.user{
  background:var(--amber);
  color:#2A1D06;
  align-self:flex-end;
  border-top-right-radius:2px;
  font-weight:500;
}
.msg.bot b{color:var(--amber);}

.controls{
  border-top:1px solid var(--teal-line);
  padding-top:16px;
}
.field-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
input[type=number], input[type=text], select{
  flex:1;
  min-width:140px;
  background:var(--teal-deep);
  border:1px solid var(--teal-line);
  color:var(--ivory);
  padding:11px 12px;
  border-radius:8px;
  font-size:14.5px;
  font-family:'Work Sans',sans-serif;
}
input:focus, select:focus{outline:2px solid var(--amber);}
.pill-row{display:flex;flex-wrap:wrap;gap:8px;}
.pill{
  background:transparent;
  border:1px solid var(--teal-line);
  color:var(--ivory);
  padding:9px 16px;
  border-radius:999px;
  cursor:pointer;
  font-size:14px;
  font-family:'Work Sans',sans-serif;
  transition:all .15s ease;
}
.pill:hover{border-color:var(--amber);}
.pill.selected{background:var(--amber);color:#2A1D06;border-color:var(--amber);font-weight:600;}
.next-btn{
  margin-top:12px;
  width:100%;
  background:var(--amber);
  color:#2A1D06;
  border:none;
  padding:12px;
  border-radius:8px;
  font-size:15px;
  font-weight:700;
  font-family:'Work Sans',sans-serif;
  cursor:pointer;
}
.next-btn:disabled{background:var(--teal-line);color:var(--ivory-dim);cursor:not-allowed;}
.next-btn:hover:not(:disabled){filter:brightness(1.08);}

.result-card{
  background:rgba(143,203,155,0.08);
  border:1px solid var(--sage);
  border-radius:12px;
  padding:20px;
}
.result-card h2{
  font-family:'Fraunces',serif;
  font-size:20px;
  color:var(--sage);
  margin:0 0 8px;
}
.result-fpl{
  font-size:13px;
  color:var(--ivory-dim);
  margin-bottom:14px;
}
.result-card p{font-size:14.5px;line-height:1.6;margin:0 0 10px;}
.disclaimer{
  font-size:12px;
  color:var(--ivory-dim);
  border-top:1px dashed var(--teal-line);
  padding-top:12px;
  margin-top:14px;
  line-height:1.6;
}
.cta{
  display:inline-block;
  margin-top:12px;
  background:var(--sage);
  color:#0F3D3E;
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
}
.restart{
  background:none;border:1px solid var(--teal-line);color:var(--ivory-dim);
  padding:9px 16px;border-radius:8px;font-size:13px;margin-top:10px;cursor:pointer;
  font-family:'Work Sans',sans-serif;
}
</style>
</head>
<body>
<div class="app">
  <div class="brand">
    <h1>Coverage Navigator</h1>
    <span>SCHO &middot; est. 2026 guidelines</span>
  </div>

  <div class="trail" id="trail"></div>

  <div class="panel">
    <div class="chat-log" id="chatLog"></div>
    <div class="controls" id="controls"></div>
  </div>
</div>

<script>
const STEPS = ["Household","Income","Location","Health","Result"];
const state = { size:null, income:null, stateCode:null, age:null, tobacco:null, pregnant:null, coverage:null, priority:null };
let step = 0;

const FPL_2026 = [15960,21640,27320,33000,38680,44360,50040,55720];
const FPL_2025 = [15650,21150,26650,32150,37650,43150,48650,54150];
const NON_EXPANSION = ["AL","FL","GA","KS","MS","SC","TN","TX","WI","WY"];
const STATES = ["CA","AL","AK","AZ","AR","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY","DC"];

function fplGuideline(table, size){
  if(size<=8) return table[size-1];
  const step = table[7]-table[6];
  return table[7] + step*(size-8);
}

function renderTrail(){
  const trail = document.getElementById('trail');
  trail.innerHTML = STEPS.map((label,i)=>{
    const cls = i<step ? 'done' : (i===step ? 'active' : '');
    return `<div class="trail-step ${cls}"><div class="trail-line"></div><div class="trail-dot"></div><div class="trail-label">${label}</div></div>`;
  }).join('');
}

function addMsg(text, who){
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.innerHTML = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function clearControls(){ document.getElementById('controls').innerHTML=''; }

function goToStep(n){
  step = n;
  renderTrail();
  document.getElementById('chatLog').innerHTML='';
  renderStep();
}

function renderStep(){
  clearControls();
  const ctrl = document.getElementById('controls');

  if(step===0){
    addMsg("Hi, I'm the SCHO Coverage Navigator. I'll ask a few quick questions and estimate what kind of health coverage you may qualify for &mdash; Medicaid/Medi-Cal, a subsidized Marketplace plan, or full-price coverage.", 'bot');
    addMsg("First: how many people are in your household (including yourself)?", 'bot');
    ctrl.innerHTML = `
      <div class="field-row">
        <input type="number" id="inp-size" min="1" max="15" placeholder="e.g. 3">
      </div>
      <button class="next-btn" id="btn-next">Continue</button>`;
    document.getElementById('btn-next').onclick = ()=>{
      const v = parseInt(document.getElementById('inp-size').value);
      if(!v || v<1){ return; }
      state.size = v;
      addMsg(`Household size: ${v}`, 'user');
      goToStep(1);
    };
  }

  else if(step===1){
    addMsg("What's your total annual household income, before taxes? (Include everyone's income &mdash; wages, self-employment, etc.)", 'bot');
    ctrl.innerHTML = `
      <div class="field-row">
        <input type="number" id="inp-income" min="0" placeholder="e.g. 42000">
      </div>
      <button class="next-btn" id="btn-next">Continue</button>`;
    document.getElementById('btn-next').onclick = ()=>{
      const v = parseInt(document.getElementById('inp-income').value);
      if(v===null || isNaN(v) || v<0){ return; }
      state.income = v;
      addMsg(`Annual household income: $${v.toLocaleString()}`, 'user');
      goToStep(2);
    };
  }

  else if(step===2){
    addMsg("Which state do you live in? Medicaid eligibility rules vary by state.", 'bot');
    const opts = STATES.map(s=>`<option value="${s}">${s}</option>`).join('');
    ctrl.innerHTML = `
      <div class="field-row">
        <select id="inp-state">${opts}</select>
      </div>
      <button class="next-btn" id="btn-next">Continue</button>`;
    document.getElementById('btn-next').onclick = ()=>{
      state.stateCode = document.getElementById('inp-state').value;
      addMsg(`State: ${state.stateCode}`, 'user');
      goToStep(3);
    };
  }

  else if(step===3){
    addMsg("A few quick health questions &mdash; is anyone in the household pregnant?", 'bot');
    ctrl.innerHTML = `
      <div class="pill-row" id="pill-pregnant">
        <button class="pill" data-v="yes">Yes</button>
        <button class="pill" data-v="no">No</button>
      </div>
      <div style="margin-top:14px;font-size:14.5px;color:var(--ivory-dim)" id="q-age-label"></div>
      <div class="field-row" style="margin-top:6px;">
        <input type="number" id="inp-age" min="0" max="120" placeholder="Your age">
      </div>
      <div class="pill-row" style="margin-top:14px;" id="pill-tobacco">
        <span style="width:100%;font-size:14.5px;color:var(--ivory-dim);margin-bottom:4px;">Does anyone use tobacco regularly?</span>
        <button class="pill" data-v="yes">Yes</button>
        <button class="pill" data-v="no">No</button>
      </div>
      <button class="next-btn" id="btn-next" disabled>Continue</button>`;

    function wirePills(containerId, key){
      const cont = document.getElementById(containerId);
      cont.querySelectorAll('.pill').forEach(btn=>{
        btn.onclick = ()=>{
          cont.querySelectorAll('.pill').forEach(b=>b.classList.remove('selected'));
          btn.classList.add('selected');
          state[key] = btn.dataset.v;
          checkReady();
        };
      });
    }
    wirePills('pill-pregnant','pregnant');
    wirePills('pill-tobacco','tobacco');

    function checkReady(){
      const age = parseInt(document.getElementById('inp-age').value);
      const ready = state.pregnant && state.tobacco && age>=0 && !isNaN(age);
      document.getElementById('btn-next').disabled = !ready;
    }
    document.getElementById('inp-age').addEventListener('input', checkReady);

    document.getElementById('btn-next').onclick = ()=>{
      state.age = parseInt(document.getElementById('inp-age').value);
      addMsg(`Pregnant: ${state.pregnant} &middot; Tobacco use: ${state.tobacco} &middot; Age: ${state.age}`, 'user');
      goToStep(4);
    };
  }

  else if(step===4){
    renderResult();
  }
}

function renderResult(){
  const fpl26 = fplGuideline(FPL_2026, state.size);
  const fpl25 = fplGuideline(FPL_2025, state.size);
  const pct26 = (state.income / fpl26) * 100;
  const pct25 = (state.income / fpl25) * 100;
  const isExpansion = !NON_EXPANSION.includes(state.stateCode);

  let title, body, cta, tone;

  if(state.age >= 65){
    title = "Check Medicare first";
    tone = 'sage';
    body = `<p>At age ${state.age}, you're likely eligible for <b>Medicare</b> rather than Medicaid or a Marketplace plan. Medicare has its own enrollment rules and doesn't depend on income the way these other programs do.</p>
    <p>If your income is very low, you may also qualify for a Medicare Savings Program or Medicaid alongside Medicare (\"dual eligible\"). A SCHO volunteer can help you sort out which applies.</p>`;
  }
  else if(pct26 <= 138 && isExpansion){
    title = "You likely qualify for Medicaid";
    tone='sage';
    body = `<p>Your household income is about <b>${pct26.toFixed(0)}% of the federal poverty level</b>. ${state.stateCode} has expanded Medicaid, so adults up to 138% FPL generally qualify &mdash; often with <b>$0 monthly premium</b>.</p>
    ${state.stateCode==='CA' ? '<p>In California this program is called <b>Medi-Cal</b>. You can apply through Covered California or your county social services office.</p>' : '<p>Apply through your state Medicaid agency or healthcare.gov, which will route low-income applicants to Medicaid automatically.</p>'}
    ${state.pregnant==='yes' ? '<p>Since someone in your household is pregnant, income limits for pregnancy-related Medicaid are usually much higher than the standard 138% cutoff &mdash; it may be worth applying even if this estimate is close to the line.</p>' : ''}`;
  }
  else if(pct26 < 100 && !isExpansion){
    title = "You may be in the coverage gap";
    tone='rose';
    body = `<p>${state.stateCode} has <b>not expanded Medicaid</b>, and your income (about ${pct26.toFixed(0)}% FPL) is below the 100% FPL threshold needed for Marketplace subsidies. This can mean falling into the "coverage gap" &mdash; too low for subsidies, but above your state's very restrictive Medicaid limits.</p>
    <p>You may still qualify for Medicaid if you're pregnant, disabled, or a parent of a minor &mdash; those limits are usually different. Community health centers (sliding-scale fee clinics) are also worth checking. This is a case where talking to a real person helps a lot.</p>`;
  }
  else if(pct25 >= 100 && pct25 <= 400){
    title = "You likely qualify for a subsidized Marketplace plan";
    tone='sage';
    const csrEligible = pct25 <= 250;
    body = `<p>Your household income is about <b>${pct25.toFixed(0)}% of the federal poverty level</b> (using 2025 guidelines, which set 2026 Marketplace subsidy eligibility). That puts you in range for a <b>premium tax credit</b> through ${state.stateCode==='CA' ? 'Covered California' : 'the Marketplace'}.</p>
    <p><b>Important for 2026:</b> the enhanced subsidies from 2021&ndash;2025 expired, so the original ACA rules are back in effect &mdash; your required contribution rises on a sliding scale, and the subsidy still phases out completely above 400% FPL.</p>
    ${csrEligible ? '<p>Because you\'re under 250% FPL, you likely also qualify for <b>Cost-Sharing Reductions</b> &mdash; but only if you pick a <b>Silver</b> plan. This can lower your deductible and copays substantially, so Silver is usually the strongest pick in your case even if a Bronze plan looks cheaper up front.</p>' : '<p>At this income level, Cost-Sharing Reductions aren\'t available, so the choice is more about your own premium vs. deductible tradeoff:</p>'}
    <div class="pill-row" id="pill-priority" style="margin-top:8px;">
      <button class="pill" data-v="premium">Lower monthly premium</button>
      <button class="pill" data-v="deductible">Lower deductible / more predictable costs</button>
    </div>
    <p id="tier-rec" style="margin-top:10px;"></p>`;
  }
  else {
    title = "Full-price Marketplace coverage";
    tone='rose';
    body = `<p>At about ${pct25.toFixed(0)}% of the federal poverty level, your household is above the 400% FPL cutoff. Since the enhanced subsidies expired at the end of 2025, <b>the subsidy cliff has returned</b> for 2026 &mdash; households above 400% FPL don't receive a premium tax credit at all this year.</p>
    <p>You can still buy a Marketplace plan, just without a subsidy. It's worth comparing that to any employer coverage available to you, since Marketplace premiums without subsidies rose sharply this year.</p>
    <div class="pill-row" id="pill-priority" style="margin-top:8px;">
      <button class="pill" data-v="premium">Lower monthly premium</button>
      <button class="pill" data-v="deductible">Lower deductible / more predictable costs</button>
    </div>
    <p id="tier-rec" style="margin-top:10px;"></p>`;
  }

  document.getElementById('chatLog').style.display='none';
  const ctrl = document.getElementById('controls');
  ctrl.style.borderTop='none';
  ctrl.innerHTML = `
    <div class="result-card" style="border-color:var(--${tone==='sage'?'sage':'rose'})">
      <h2>${title}</h2>
      <div class="result-fpl">Household of ${state.size} &middot; $${state.income.toLocaleString()}/yr &middot; ${state.stateCode}</div>
      ${body}
      <div class="disclaimer">This is an educational estimate based on published 2025&ndash;2026 federal poverty guidelines and ACA rules, not an official eligibility determination. Actual results depend on exact income counting rules, state-specific programs, and application details. Please confirm with ${state.stateCode==='CA' ? 'Covered California / Medi-Cal' : 'healthcare.gov or your state Medicaid office'} or a SCHO volunteer.</div>
      <a class="cta" href="mailto:info@schealthcareoutreach.org?subject=Coverage%20Navigator%20follow-up">Talk to a SCHO volunteer &rarr;</a>
      <br><button class="restart" id="btn-restart">Start over</button>
    </div>`;

  const pillWrap = document.getElementById('pill-priority');
  if(pillWrap){
    pillWrap.querySelectorAll('.pill').forEach(btn=>{
      btn.onclick = ()=>{
        pillWrap.querySelectorAll('.pill').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        const rec = document.getElementById('tier-rec');
        if(btn.dataset.v==='premium'){
          rec.innerHTML = 'With that priority, a <b>Bronze</b> plan usually fits best &mdash; lowest premium, but expect a high deductible, so it suits someone who mostly wants protection from a major medical event.';
        } else {
          rec.innerHTML = 'With that priority, a <b>Silver or Gold</b> plan usually fits best &mdash; higher premium, but lower deductible and copays, so routine care costs less throughout the year.';
        }
      };
    });
  }
  document.getElementById('btn-restart').onclick = ()=>{
    Object.keys(state).forEach(k=>state[k]=null);
    document.getElementById('chatLog').style.display='flex';
    goToStep(0);
  };
}

renderTrail();
renderStep();
</script>
</body>
</html>
